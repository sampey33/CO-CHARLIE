<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIENTA-TAC</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--olive:#4a5240;--olive-dark:#2e3328;--khaki:#8b8b5a;--sand:#c8b882;--red:#c0392b;--green:#27ae60;--bg:#1a1c16;--bg2:#22251c;--bg3:#2a2e22;--text:#d4cdb0;--dim:#7a7560;--border:#363a2c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--olive-dark);border-bottom:2px solid var(--khaki);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--sand);letter-spacing:4px;display:flex;align-items:center;gap:10px}
.logo-mark{width:26px;height:26px;border:2px solid var(--sand);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.tab{padding:6px 14px;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--dim)}
.tab.active{background:var(--olive);color:var(--sand)}
.view{display:none;padding:24px;max-width:980px;margin:0 auto}
.view.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);padding:16px;margin-bottom:12px}
input,textarea,select{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text)}
button{cursor:pointer}
.btn{padding:8px 12px;border:0}
.btn-primary{background:var(--khaki);color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.row{padding:8px;border:1px solid var(--border);margin:6px 0}
.big{font-size:2rem;text-align:center}
.hidden{display:none}
</style>
</head>
<body>
<header>
<div class="logo"><div class="logo-mark">✦</div> ORIENTA-TAC</div>
<div>
<button class="tab active" onclick="nav('admin',this)">ADMIN</button>
<button class="tab" onclick="nav('participant',this)">PARTICIPANT</button>
</div>
</header><!-- ADMIN --><div id="view-admin" class="view active"><div id="admin-login" class="card">
<h3>Accès admin</h3>
<input type="password" id="pwd" placeholder="mot de passe">
<button class="btn btn-primary" onclick="loginAdmin()">Entrer</button>
<div id="err"></div>
</div><div id="admin-panel" class="hidden"><div class="card">
<h3>Postes</h3>
<div id="posts"></div>
<hr>
<input id="pnum" type="number" placeholder="num">
<input id="pname" placeholder="nom">
<textarea id="pquest" placeholder="question"></textarea>
<input id="pop1" placeholder="option 1">
<input id="pop2" placeholder="option 2">
<input id="pop3" placeholder="option 3">
<input id="pcorrect" type="number" placeholder="bonne réponse (1-3)">
<button class="btn btn-primary" onclick="addPost()">Ajouter</button>
</div><div class="card">
<h3>Joueurs</h3>
<div id="players"></div>
<input id="player" placeholder="pseudo">
<button class="btn btn-primary" onclick="addPlayer()">Ajouter</button>
</div></div>
</div><!-- PARTICIPANT --><div id="view-participant" class="view"><div id="login" class="card">
<input id="plog" placeholder="pseudo">
<button class="btn btn-primary" onclick="loginPlayer()">Start</button>
</div><div id="game" class="hidden">
<div class="big" id="timer">00:00</div>
<div id="qbox"></div>
<button class="btn btn-primary" onclick="nextQ()">Valider</button>
</div></div><script>
let posts = JSON.parse(localStorage.getItem('posts')||'[]');
let players = JSON.parse(localStorage.getItem('players')||'[]');
let currentPlayer = null;
let idx = 0;

function save(){localStorage.setItem('posts',JSON.stringify(posts));localStorage.setItem('players',JSON.stringify(players));}

function nav(v,el){
document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
document.getElementById('view-'+v).classList.add('active');
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');}

function loginAdmin(){
if(document.getElementById('pwd').value==='admin'){document.getElementById('admin-login').classList.add('hidden');document.getElementById('admin-panel').classList.remove('hidden');render();}else{document.getElementById('err').innerText='Erreur';}
}

function addPost(){
posts.push({
num:document.getElementById('pnum').value,
name:document.getElementById('pname').value,
q:document.getElementById('pquest').value,
opts:[pop1.value,pop2.value,pop3.value],
correct:+document.getElementById('pcorrect').value
});
save();render();}

function render(){
document.getElementById('posts').innerHTML=posts.map((p,i)=>`<div class='row'>${p.num} - ${p.name}</div>`).join('');
document.getElementById('players').innerHTML=players.map(p=>`<div class='row'>${p}</div>`).join('');}

function addPlayer(){players.push(player.value.toUpperCase());save();render();player.value='';}

function loginPlayer(){
currentPlayer=document.getElementById('plog').value.toUpperCase();
if(!currentPlayer)return;
document.getElementById('login').classList.add('hidden');
document.getElementById('game').classList.remove('hidden');renderQ();}

function renderQ(){
if(idx>=posts.length){document.getElementById('qbox').innerHTML='FIN';return;}
let p=posts[idx];
document.getElementById('qbox').innerHTML=`<h3>${p.q}</h3>`+p.opts.map((o,i)=>`<div><input type='radio' name='a' value='${i+1}'> ${o}</div>`).join('');
}

function nextQ(){idx++;renderQ();}
</script></body>
</html>
